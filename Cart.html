<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Star Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="Style.css">
<script src="KpopData.js" defer></script>
<script src="Cart.js" defer></script>
</head>
<body class="is-authenticated">
<header class="app-header compact-header">
<div>
<h1>Checkout Cart</h1>
<p>Review your merch and concert tickets, then add your delivery address.</p>
</div>
<div class="header-actions">
<a class="ghost-btn link-button" href="Main.html#store">Back to store</a>
</div>
</header>

<main class="page-shell">
<section class="panel">
<div class="section-heading">
<div>
<span class="eyebrow">Ready To Buy</span>
<h2>Your Cart</h2>
</div>
<span id="cartPageTotal" class="pill">$0 total</span>
</div>
<div id="cartPageItems" class="cart-items"></div>
</section>

<section class="panel">
<div class="section-heading">
<div>
<span class="eyebrow">Delivery</span>
<h2>Address & Payment</h2>
</div>
</div>
<form id="cartCheckoutForm" class="address-form">
<label for="addressName">Full name</label>
<input id="addressName" type="text" required>
<label for="addressPhone">Phone number</label>
<input id="addressPhone" type="tel" required>
<label for="addressLine">Address</label>
<input id="addressLine" type="text" placeholder="House, street, area" required>
<label for="addressCity">City</label>
<input id="addressCity" type="text" required>
<label for="addressState">State</label>
<input id="addressState" type="text" required>
<label for="addressZip">Postal code</label>
<input id="addressZip" type="text" required>
<label for="paymentMethod">Payment option</label>
<select id="paymentMethod">
<option value="card">Credit / Debit Card</option>
<option value="upi">UPI</option>
<option value="paypal">PayPal</option>
<option value="netbanking">Net Banking</option>
</select>
<button type="submit">Place order</button>
</form>
</section>
</main>

<div id="notificationPanel" class="notification-panel" aria-live="polite"></div>
</body>
</html>
